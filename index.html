<!DOCTYPE html> 
<html lang="es">
    <head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Tatoo Studie</title>
       <link rel="stylesheet" href="style.css">
    </head>
    <body>    
        <canvas id="particles"></canvas>
        <header>
            <h1>Black <span>Dragon</span></h1>
            <nav>
            <ul>
            <li> <a href="#">Inicio</a>   </li>
            <li> <a href="#">Galeria</a>  </li>
            <li> <a href="#">Contacto</a> </li>
            </ul>
            </nav>  
        </header>     
        <main>
         <section class="hero">
            <h2>El fuego negro es lo mas atractivo</h2>
            <p>tatuajes que consumen tu alma</p>
            <button>Ver Trabajos</button>
         </section>
         <div class="separador"></div>
         <section class="galeria">
            <h2>Nuestros trabajos</h2>
            <div class="cartas">
                <div class="carta">
                    <img src="tatoo1.jpg" alt="Tatuaje 1">
                    <div class="carta-overlay">
                        <span>Ver más</span>
                    </div>
                </div>
                <div class="carta">
                    <img src="tatoo2.jpg" alt="Tatuaje 2">
                    <div class="carta-overlay">
                        <span>Ver más</span>
                    </div>
                </div>
                <div class="carta">
                    <img src="tatoo3.jpg" alt="Tatuaje 3">
                    <div class="carta-overlay">
                        <span>Ver más</span>
                    </div>
                </div>
            </div>
         </section>
         <div class="separador"></div>
         <section class="contacto">
            <h2>Reservá tu turno</h2>
            <form>
               <input type="text" placeholder="Tu nombre"> 
               <input type="email" placeholder="Tu email"> 
               <textarea placeholder="contanos tu idea"></textarea>
               <button>Enviar</button>
            </form>
         </section>
        </main>
        <footer>
            <p>© 2024 Black Dragon — Todos los derechos reservados</p>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
